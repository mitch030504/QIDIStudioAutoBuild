name: Continuous Iterative Auto-Healing QIDI Build

on:
  workflow_dispatch:

jobs:
  build-and-loop-heal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout QIDI Studio Upstream Source
      uses: actions/checkout@v4
      with:
        repository: 'QIDITECH/QIDIStudio'
        ref: 'main' 
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI SDK
      run: pip install google-genai

    - name: Orchestrate Iterative Build Loop
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        MAX_RETRIES: 7 # Allows up to 7 consecutive fix attempts
      run: |
        python - << 'EOF'
        import os
        import subprocess
        import sys
        import re
        from google import genai

        max_retries = int(os.environ.get("MAX_RETRIES", 7))
        client = genai.Client()
        fix_history = []

        print(f"🚀 Starting continuous multi-turn auto-healing build system (Max Retries: {max_retries})")

        for attempt in range(1, max_retries + 1):
            print(f"\n=== 🛠️ BUILD ATTEMPT #{attempt} ===")
            log_file_path = "build_output.log"
            
            # 1. Run the docker build and stream outputs live to the console and a file
            with open(log_file_path, "w") as log_file:
                process = subprocess.Popen(
                    ["docker", "build", "-t", "qidi-studio-compiler", "-f", "Containerfile", "."],
                    stdout=subprocess.PIPE,
                    stderr=subprocess.STDOUT,
                    text=True
                )
                
                for line in process.stdout:
                    sys.stdout.write(line) # Streams live to your GitHub Action console
                    log_file.write(line)   # Saves log for Gemini analysis
                    
                process.wait()
                return_code = process.returncode

            # 2. Check for ultimate compilation success
            if return_code == 0:
                print(f"\n🎉 Success! QIDI Studio compiled successfully on attempt #{attempt}!")
                sys.exit(0)
                
            print(f"❌ Build attempt #{attempt} failed with exit code {return_code}.")
            if attempt == max_retries:
                print("🚨 Reached maximum retry limit. Auto-healing loop aborted.")
                sys.exit(1)

            # 3. Read context files to prepare for Gemini
            with open(log_file_path, "r") as f:
                log_content = f.read()[-6000:] # Grab the trailing compilation failure lines

            containerfile_content = "File not found"
            if os.path.exists("Containerfile"):
                with open("Containerfile", "r") as f:
                    containerfile_content = f.read()

            # Smart Context: If a specific CMake file breaks, pull its contents into the prompt
            cmake_context = ""
            target_cmake = "src/slic3r/CMakeLists.txt"
            if os.path.exists(target_cmake):
                with open(target_cmake, "r") as f:
                    lines = f.readlines()
                    # Capture around line 728 where the UserPresetSyncManager error happens
                    start = max(0, 728 - 40)
                    end = min(len(lines), 728 + 40)
                    cmake_context = "".join(lines[start:end])

            print(f"🔮 Packaging system context and sending to Gemini...")

            # Compile history string so Gemini knows what it tried previously
            history_str = "\n".join([f"- Attempt {h['idx']}: Applied script:\n{h['script']}" for h in fix_history])

            prompt = f"""
            You are an automated Linux systems engineer fixing a broken Docker compilation for QIDIStudio.
            This is loop attempt #{attempt} out of {max_retries}. 

            --- PREVIOUS REPAIR ATTEMPTS HISTORY ---
            {history_str if fix_history else "No previous attempts."}

            --- LATEST LOG ERROR ---
            {log_content}

            --- CURRENT HOST CONTAINERFILE ---
            {containerfile_content}

            --- CONTEXTUAL CMAKELISTS.TXT SNIPPET (Around line 728) ---
            {cmake_context}

            Provide a Bash script that runs on the host runner to fix this issue.
            You can use commands like 'sed' to alter CMakeLists.txt, 'touch' to create missing placeholders, or 'echo' to modify the Containerfile.
            
            Wrap your script inside a single markdown code block:
            ```bash
            # your commands here
            ```
            Do not include any written explanations or conversational text outside the code block.
            """

            try:
                response = client.models.generate_content(
                    model='gemini-2.5-flash',
                    contents=prompt
                )
                
                # Robustly extract the raw code inside the bash blocks
                code_blocks = re.findall(r'```(?:bash|sh)?\n(.*?)\n```', response.text, re.DOTALL)
                fix_script = code_blocks[0].strip() if code_blocks else response.text.strip()
                fix_script = fix_script.replace('```bash', '').replace('```', '').strip()
                
                script_path = "loop_heal_fix.sh"
                with open(script_path, "w") as f:
                    f.write(fix_script)
                
                print(f"🔧 Gemini proposed the following fix script for this turn:\n{fix_script}\n")
                fix_history.append({"idx": attempt, "script": fix_script})
                
                # Execute the patch on the host environment
                subprocess.run(["chmod", "+x", script_path], check=True)
                exec_result = subprocess.run([f"./{script_path}"], shell=True, capture_output=True, text=True)
                
                if exec_result.returncode != 0:
                    print(f"⚠️ Fix script execution warning: returned non-zero code {exec_result.returncode}")
                    print(f"Script Error Output: {exec_result.stderr}")
                    # We don't crash here! We let it loop back so Gemini sees the failure in the next log
                else:
                    print("✅ Fix script applied successfully to workspace. Re-building...")
                    
            except Exception as e:
                print(f"⚠️ Non-fatal parsing/execution error in orchestrator: {e}")
                # Loop safety continues even if a single API turn hiccups
        EOF

    - name: Extract Compiled Files
      run: |
        echo "Extracting finished build directory from container..."
        docker create --name extractor qidi-studio-compiler
        mkdir -p ./build_output
        docker cp extractor:/QIDIStudio/build ./build_output/ || docker cp extractor:/workspace/build ./build_output/ || true
        docker rm extractor

    - name: Upload Finished AppImage Only
      uses: actions/upload-artifact@v4
      with:
        name: QIDI-Studio-Linux-AppImage
        path: ./build_output/**/*.AppImage
        if-no-files-found: warn

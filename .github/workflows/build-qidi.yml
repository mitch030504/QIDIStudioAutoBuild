name: Auto-Healing QIDI Studio Build

on:
  workflow_dispatch: # Allows you to manually click "Run Workflow" anytime

jobs:
  build-and-heal:
    runs-on: ubuntu-latest

    steps:
    # CHANGE HERE: This pulls the actual QIDI Studio source code into the runner
    - name: Checkout QIDI Studio Upstream Source
      uses: actions/checkout@v4
      with:
        repository: 'QIDITECH/QIDIStudio'
        ref: 'main' # Targets their default development branch
        fetch-depth: 1

    - name: Set up Python (For AI Scripting)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Google GenAI SDK
      run: pip install google-genai

    - name: Attempt Initial Build
      id: first_attempt
      continue-on-error: true 
      run: |
        echo "Attempting standard compilation..."
        # The Containerfile now exists because we checked out the official repo above
        docker build -t qidi-studio-compiler -f Containerfile . 2>&1 | tee build_failure.log

    - name: Trigger Auto-Heal (Only Runs on Failure)
      if: steps.first_attempt.outcome == 'failure'
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python - << 'EOF'
        import os
        from google import genai

        print("🔮 Build failed. Engaging Gemini Auto-Heal...")

        if not os.path.exists("build_failure.log"):
            print("Error: build_failure.log missing.")
            exit(1)

        with open("build_failure.log", "r") as f:
            log_content = f.read()[-5000:] 

        with open("Containerfile", "r") as f:
            containerfile_content = f.read()

        client = genai.Client()
        
        prompt = f"""
        The following Docker build failed. Analyze the error log and the Containerfile provided below.
        Provide ONLY a valid Bash script that will run on the host system to modify files (e.g., using sed, echo, or rewriting the Containerfile) to fix the issue.
        Do not include markdown code blocks like ```bash or any explanations. Return ONLY the raw executable bash commands.

        --- ERROR LOG ---
        {log_content}

        --- CONTAINERFILE ---
        {containerfile_content}
        """

        response = client.models.generate_content(
            model='gemini-2.5-flash',
            contents=prompt
        )

        fix_script = response.text.replace('```bash', '').replace('```', '').strip()
        with open("heal_fix.sh", "w") as f:
            f.write(fix_script)
            
        print("🔧 Gemini proposed the following fix script:\n", fix_script)
        EOF

        # Execute the fix script generated by Gemini if it exists
        if [ -f heal_fix.sh ]; then
          chmod +x heal_fix.sh
          ./heal_fix.sh
        fi

    - name: Re-Attempt Build After Auto-Heal
      if: steps.first_attempt.outcome == 'failure'
      run: |
        echo "🚀 Re-trying build with Gemini's applied corrections..."
        docker build -t qidi-studio-compiler -f Containerfile .

    - name: Extract Compiled Files
      run: |
        echo "Extracting build directory from container..."
        docker create --name extractor qidi-studio-compiler
        mkdir -p ./build_output
        docker cp extractor:/QIDIStudio/build ./build_output/ || docker cp extractor:/workspace/build ./build_output/ || true
        docker rm extractor

    - name: Upload Finished AppImage Only
      uses: actions/upload-artifact@v4
      with:
        name: QIDI-Studio-Linux-AppImage
        path: ./build_output/**/*.AppImage
        if-no-files-found: warn # Changed to warn so it doesn't break the pipeline if compilation truly fails
